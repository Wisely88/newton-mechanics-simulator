<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>牛顿力学教学模拟器</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #182430;
      --muted: #637282;
      --line: #d8e1e8;
      --panel: #ffffff;
      --soft: #f3f7fa;
      --blue: #2364aa;
      --green: #1b7f5f;
      --red: #c9413a;
      --amber: #b66a15;
      --shadow: 0 14px 34px rgba(23, 36, 49, .1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: #eef4f7;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      width: min(1240px, 100%);
      margin: 0 auto;
      padding: 22px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 18px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .stage-card,
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .stage-head,
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 13px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(248, 251, 253, .92);
    }

    h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .stage-wrap {
      position: relative;
      aspect-ratio: 16 / 8.8;
      min-height: 430px;
      background: #fbfdff;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .readout {
      position: absolute;
      left: 14px;
      top: 14px;
      width: min(820px, calc(100% - 28px));
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      pointer-events: none;
    }

    .metric {
      min-height: 58px;
      padding: 8px 10px;
      border: 1px solid rgba(216, 225, 232, .82);
      border-radius: 8px;
      background: rgba(255, 255, 255, .9);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .metric b {
      display: block;
      margin-top: 4px;
      font-size: 15px;
      overflow-wrap: anywhere;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid var(--line);
      background: #fff;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 750;
      color: var(--ink);
    }

    .btn.primary {
      color: #fff;
      background: var(--blue);
      border-color: var(--blue);
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: #9fb2c3;
    }

    .below {
      display: grid;
      grid-template-columns: minmax(320px, .9fr) minmax(420px, 1.1fr);
      gap: 16px;
      margin-top: 16px;
      align-items: start;
    }

    .panel-body {
      padding: 16px;
    }

    .scene-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .scene-tab {
      min-height: 44px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 800;
      color: var(--muted);
    }

    .scene-tab.active {
      color: #fff;
      background: var(--blue);
      border-color: var(--blue);
    }

    .input-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    input[type="number"] {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 11px;
      background: #fff;
      color: var(--ink);
    }

    input[type="number"]:focus {
      outline: 2px solid rgba(35, 100, 170, .22);
      border-color: var(--blue);
    }

    .form-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .summary {
      margin-top: 14px;
      padding: 12px;
      border-radius: 8px;
      background: var(--soft);
      border: 1px solid var(--line);
      color: #324353;
      line-height: 1.65;
      min-height: 76px;
    }

    .analysis-grid {
      display: grid;
      gap: 12px;
    }

    .formula-box {
      border-left: 4px solid var(--blue);
      background: #f2f7fc;
      border-radius: 0 8px 8px 0;
      padding: 12px 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 16px;
      line-height: 1.6;
      overflow-wrap: anywhere;
    }

    .explain,
    .life {
      margin: 0;
      line-height: 1.7;
      color: #324353;
    }

    .life {
      border-top: 1px solid var(--line);
      padding-top: 12px;
    }

    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
    }

    .legend i {
      display: inline-block;
      width: 22px;
      height: 4px;
      border-radius: 99px;
      margin-right: 6px;
      vertical-align: middle;
    }

    .blue {
      background: var(--blue);
    }

    .green {
      background: var(--green);
    }

    .red {
      background: var(--red);
    }

    @media (max-width: 920px) {
      header {
        align-items: stretch;
        flex-direction: column;
      }

      .below {
        grid-template-columns: 1fr;
      }

      .readout {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .app {
        padding: 14px;
      }

      .stage-wrap {
        min-height: 360px;
        aspect-ratio: 1 / 1;
      }

      .input-grid,
      .scene-tabs {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>牛顿力学教学模拟器</h1>
        <p class="subtitle">先手动填写参数，再点击开始。模拟物体碰到画布边界或达到时间条件会自动停止。</p>
      </div>
      <div class="toolbar" aria-label="模拟控制">
        <button class="btn primary" id="startButton">开始</button>
        <button class="btn" id="pauseButton">暂停</button>
        <button class="btn" id="resetButton">重置</button>
      </div>
    </header>

    <section class="stage-card">
      <div class="stage-head">
        <h2 id="sceneTitle">水平受力</h2>
        <div class="legend">
          <span><i class="blue"></i>速度</span>
          <span><i class="red"></i>合力/重力</span>
          <span><i class="green"></i>轨迹</span>
        </div>
      </div>
      <div class="stage-wrap">
        <canvas id="stage" width="1200" height="660" aria-label="模拟画布"></canvas>
        <div class="readout">
          <div class="metric"><span>时间 t</span><b id="timeValue">0.00 s</b></div>
          <div class="metric"><span>位置</span><b id="positionValue">0.00 m</b></div>
          <div class="metric"><span>速度 v</span><b id="velocityValue">0.00 m/s</b></div>
          <div class="metric"><span>加速度 a</span><b id="accelValue">0.00 m/s²</b></div>
          <div class="metric"><span>状态</span><b id="statusValue">等待参数</b></div>
        </div>
      </div>
    </section>

    <section class="below">
      <aside class="panel">
        <div class="panel-head">
          <h2>参数设置</h2>
        </div>
        <div class="panel-body">
          <div class="scene-tabs" role="tablist" aria-label="实验场景">
            <button class="scene-tab active" data-scene="force">水平受力</button>
            <button class="scene-tab" data-scene="projectile">斜抛运动</button>
            <button class="scene-tab" data-scene="spring">弹簧振子</button>
          </div>
          <div class="input-grid" id="inputs"></div>
          <div class="form-actions">
            <button class="btn primary" id="startButtonBottom">开始模拟</button>
            <button class="btn" id="clearButton">参数归零</button>
          </div>
          <div class="summary" id="paramSummary">填写参数后点击开始，这里会显示本次模拟使用的参数。</div>
        </div>
      </aside>

      <section class="panel">
        <div class="panel-head">
          <h2>公式解析与生活场景</h2>
        </div>
        <div class="panel-body analysis-grid">
          <div class="formula-box" id="formulaBox"></div>
          <p class="explain" id="formulaExplain"></p>
          <p class="life" id="lifeExample"></p>
        </div>
      </section>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("stage");
    const ctx = canvas.getContext("2d");
    const inputsEl = document.getElementById("inputs");
    const sceneTitle = document.getElementById("sceneTitle");
    const formulaBox = document.getElementById("formulaBox");
    const formulaExplain = document.getElementById("formulaExplain");
    const lifeExample = document.getElementById("lifeExample");
    const paramSummary = document.getElementById("paramSummary");
    const startButton = document.getElementById("startButton");
    const startButtonBottom = document.getElementById("startButtonBottom");
    const pauseButton = document.getElementById("pauseButton");
    const resetButton = document.getElementById("resetButton");
    const clearButton = document.getElementById("clearButton");

    const readouts = {
      time: document.getElementById("timeValue"),
      position: document.getElementById("positionValue"),
      velocity: document.getElementById("velocityValue"),
      accel: document.getElementById("accelValue"),
      status: document.getElementById("statusValue")
    };

    const scenes = {
      force: {
        title: "水平受力",
        formula: "ΣF = ma；a = (F - f) / m；f = μmg",
        explain: "水平方向的合力决定小车加速度。质量越大，同样的外力产生的加速度越小；摩擦力与运动方向相反，会让小车更快停下。",
        life: "生活场景：推购物车、推讲台上的小车、汽车在粗糙路面上加速，都可以用这个模型理解。",
        fields: [
          { key: "mass", label: "质量 m (kg)", step: "0.1" },
          { key: "force", label: "外力 F (N)", step: "0.1" },
          { key: "friction", label: "摩擦因数 μ", step: "0.01" },
          { key: "velocity", label: "初速度 v₀ (m/s)", step: "0.1" },
          { key: "maxTime", label: "模拟时长 (s，0 表示自动)", step: "0.5" }
        ]
      },
      projectile: {
        title: "斜抛运动",
        formula: "x = v₀cosθ · t；y = h + v₀sinθ · t - 1/2gt²",
        explain: "忽略空气阻力时，水平方向近似匀速，竖直方向做加速度为 -g 的运动。两种运动叠加后形成抛物线。",
        life: "生活场景：投篮球、踢足球、喷泉水柱、扔粉笔头，运动轨迹都可以用斜抛运动近似解释。",
        fields: [
          { key: "speed", label: "初速度 v₀ (m/s)", step: "0.1" },
          { key: "angle", label: "发射角 θ (°)", step: "1" },
          { key: "gravity", label: "重力加速度 g (m/s²)", step: "0.1" },
          { key: "height", label: "初始高度 h (m)", step: "0.1" },
          { key: "maxTime", label: "模拟时长 (s，0 表示自动)", step: "0.5" }
        ]
      },
      spring: {
        title: "弹簧振子",
        formula: "F = -kx - cv；a = F / m",
        explain: "弹簧力总是指向平衡位置，位移越大回复力越大。阻尼力与速度方向相反，会逐渐消耗机械能。",
        life: "生活场景：汽车减震器、弹簧测力计、门吸回弹、蹦床上下振动，都能看到弹簧和阻尼的影子。",
        fields: [
          { key: "mass", label: "质量 m (kg)", step: "0.1" },
          { key: "stiffness", label: "劲度系数 k (N/m)", step: "0.1" },
          { key: "damping", label: "阻尼 c (N·s/m)", step: "0.1" },
          { key: "displacement", label: "初位移 x₀ (m)", step: "0.1" },
          { key: "maxTime", label: "模拟时长 (s，0 表示自动)", step: "0.5" }
        ]
      }
    };

    const margin = 54;
    let activeScene = "force";
    let values = {};
    let state = {};
    let trail = [];
    let started = false;
    let running = false;
    let lastTime = performance.now();

    function zeroValues() {
      values = {};
      scenes[activeScene].fields.forEach(field => {
        values[field.key] = 0;
      });
    }

    function renderScene() {
      const scene = scenes[activeScene];
      sceneTitle.textContent = scene.title;
      formulaBox.textContent = scene.formula;
      formulaExplain.textContent = scene.explain;
      lifeExample.textContent = scene.life;
      inputsEl.innerHTML = scene.fields.map(field => `
        <div class="field">
          <label for="${field.key}">${field.label}</label>
          <input id="${field.key}" data-key="${field.key}" type="number" step="${field.step}" value="0" inputmode="decimal">
        </div>
      `).join("");
      inputsEl.querySelectorAll("input").forEach(input => {
        input.addEventListener("input", () => {
          values[input.dataset.key] = Number(input.value || 0);
        });
      });
      zeroValues();
      resetSimulation(false);
    }

    function readFormValues() {
      inputsEl.querySelectorAll("input").forEach(input => {
        values[input.dataset.key] = Number(input.value || 0);
      });
    }

    function startSimulation() {
      readFormValues();
      started = true;
      running = true;
      pauseButton.textContent = "暂停";
      lastTime = performance.now();
      trail = [];

      if (activeScene === "force") {
        state = { t: 0, x: 0, y: 0, vx: values.velocity, vy: 0, ax: 0, ay: 0, stopped: false, stopReason: "" };
      }
      if (activeScene === "projectile") {
        const angle = values.angle * Math.PI / 180;
        state = {
          t: 0,
          x: 0,
          y: Math.max(0, values.height),
          vx: values.speed * Math.cos(angle),
          vy: values.speed * Math.sin(angle),
          ax: 0,
          ay: -values.gravity,
          stopped: false,
          stopReason: ""
        };
      }
      if (activeScene === "spring") {
        state = { t: 0, x: values.displacement, y: 0, vx: 0, vy: 0, ax: 0, ay: 0, stopped: false, stopReason: "" };
      }

      paramSummary.textContent = buildSummary();
      updateReadout();
      draw();
    }

    function resetSimulation(keepStarted) {
      started = keepStarted;
      running = false;
      trail = [];
      state = { t: 0, x: 0, y: 0, vx: 0, vy: 0, ax: 0, ay: 0, stopped: false, stopReason: "" };
      pauseButton.textContent = "暂停";
      paramSummary.textContent = keepStarted ? buildSummary() : "填写参数后点击开始，这里会显示本次模拟使用的参数。";
      updateReadout();
      draw();
    }

    function clearInputs() {
      inputsEl.querySelectorAll("input").forEach(input => {
        input.value = "0";
      });
      zeroValues();
      resetSimulation(false);
    }

    function buildSummary() {
      const scene = scenes[activeScene];
      const parts = scene.fields.map(field => `${field.label.replace(/（.*?）|\(.*?\)/g, "")}: ${format(values[field.key])}`);
      return `本次模拟：${scene.title}。${parts.join("；")}。`;
    }

    function physics(dt) {
      if (!started || !running || state.stopped) return;

      if (activeScene === "force") {
        if (values.mass <= 0) {
          stopMotion("质量需大于 0");
          return;
        }
        const normal = values.mass * 9.8;
        let friction = 0;
        if (Math.abs(state.vx) > 0.02) {
          friction = -Math.sign(state.vx) * Math.max(0, values.friction) * normal;
        } else if (Math.abs(values.force) <= Math.max(0, values.friction) * normal) {
          friction = -values.force;
          state.vx = 0;
        } else {
          friction = -Math.sign(values.force || 1) * Math.max(0, values.friction) * normal;
        }
        state.ax = (values.force + friction) / values.mass;
        state.vx += state.ax * dt;
        state.x += state.vx * dt;
      }

      if (activeScene === "projectile") {
        state.ay = -values.gravity;
        state.vy += state.ay * dt;
        state.x += state.vx * dt;
        state.y += state.vy * dt;
        if (state.y <= 0 && state.t > 0.05) {
          state.y = 0;
          stopMotion("落地停止");
        }
      }

      if (activeScene === "spring") {
        if (values.mass <= 0) {
          stopMotion("质量需大于 0");
          return;
        }
        const force = -values.stiffness * state.x - values.damping * state.vx;
        state.ax = force / values.mass;
        state.vx += state.ax * dt;
        state.x += state.vx * dt;
      }

      state.t += dt;
      if (values.maxTime > 0 && state.t >= values.maxTime) {
        state.t = values.maxTime;
        stopMotion("达到设定时长");
      }
      stopIfOutsideCanvas();
      trail.push({ x: state.x, y: state.y });
      if (trail.length > 320) trail.shift();
      updateReadout();
    }

    function stopIfOutsideCanvas() {
      const p = toCanvasPoint(state.x, state.y);
      if (p.x < margin || p.x > canvas.width - margin || p.y < margin || p.y > canvas.height - margin) {
        const clamped = fromCanvasPoint(
          Math.min(canvas.width - margin, Math.max(margin, p.x)),
          Math.min(canvas.height - margin, Math.max(margin, p.y))
        );
        state.x = clamped.x;
        state.y = clamped.y;
        stopMotion("到达画布边界");
      }
    }

    function stopMotion(reason) {
      state.stopped = true;
      state.stopReason = reason;
      state.vx = 0;
      state.vy = 0;
      state.ax = 0;
      state.ay = 0;
      running = false;
      pauseButton.textContent = "继续";
    }

    function updateReadout() {
      const speed = activeScene === "projectile" ? Math.hypot(state.vx, state.vy) : state.vx;
      const accel = activeScene === "projectile" ? Math.hypot(state.ax || 0, state.ay || 0) : state.ax;
      readouts.time.textContent = `${format(state.t)} s`;
      readouts.position.textContent = activeScene === "projectile"
        ? `(${format(state.x)}, ${format(state.y)}) m`
        : `${format(state.x)} m`;
      readouts.velocity.textContent = `${format(speed)} m/s`;
      readouts.accel.textContent = `${format(accel)} m/s²`;
      if (!started) readouts.status.textContent = "等待参数";
      else readouts.status.textContent = state.stopped ? state.stopReason : (running ? "模拟中" : "已暂停");
    }

    function draw() {
      drawGrid();
      if (!started) {
        drawStartHint();
        return;
      }
      if (activeScene === "force") drawForce();
      if (activeScene === "projectile") drawProjectile();
      if (activeScene === "spring") drawSpring();
    }

    function drawGrid() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#fbfdff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = "#e8eef3";
      ctx.lineWidth = 1;
      for (let x = 0; x <= canvas.width; x += 60) line(x, 0, x, canvas.height);
      for (let y = 0; y <= canvas.height; y += 60) line(0, y, canvas.width, y);
      ctx.strokeStyle = "#c9413a";
      ctx.setLineDash([8, 8]);
      ctx.strokeRect(margin, margin, canvas.width - margin * 2, canvas.height - margin * 2);
      ctx.setLineDash([]);
    }

    function drawStartHint() {
      label("请在下方填写参数，然后点击开始模拟", canvas.width / 2 - 188, canvas.height / 2, "#637282", 22);
    }

    function drawForce() {
      const ground = canvas.height * 0.68;
      const point = toCanvasPoint(state.x, 0);
      point.y = ground - 40;
      drawGround(ground);
      drawTrail(p => ({ x: toCanvasPoint(p.x, 0).x, y: ground - 38 }));
      drawCar(point.x, point.y, "#f0b84d");
      drawArrow(point.x, point.y - 70, point.x + state.vx * 16, point.y - 70, "#2364aa", "v");
      drawArrow(point.x, point.y - 112, point.x + (values.force || 0) * 5, point.y - 112, "#c9413a", "F");
      drawStopLabel(70, ground - 172);
    }

    function drawProjectile() {
      const ground = canvas.height - 88;
      drawGround(ground);
      drawTrail(p => toCanvasPoint(p.x, p.y));
      const point = toCanvasPoint(state.x, state.y);
      drawBall(point.x, point.y, 22, "#d95d4f");
      drawArrow(point.x, point.y, point.x + state.vx * 3, point.y - state.vy * 3, "#2364aa", "v");
      drawArrow(point.x + 44, point.y - 8, point.x + 44, point.y + Math.max(10, values.gravity * 5), "#c9413a", "mg");
      drawStopLabel(70, ground - 238);
    }

    function drawSpring() {
      const centerY = canvas.height * 0.56;
      const point = toCanvasPoint(state.x, 0);
      const wallX = margin + 46;
      drawTrack(centerY + 58);
      drawWall(wallX, centerY);
      drawSpringShape(wallX + 16, centerY, point.x - 58, centerY);
      drawBlock(point.x - 54, centerY - 42, 108, 84, "#73b7a5");
      drawTrail(p => ({ x: toCanvasPoint(p.x, 0).x, y: centerY + 92 }));
      drawArrow(point.x, centerY - 82, point.x + state.vx * 22, centerY - 82, "#2364aa", "v");
      drawArrow(point.x, centerY - 122, point.x + state.ax * 18, centerY - 122, "#c9413a", "F");
      ctx.strokeStyle = "#b66a15";
      ctx.setLineDash([8, 8]);
      line(canvas.width / 2, centerY - 130, canvas.width / 2, centerY + 124);
      ctx.setLineDash([]);
      label("平衡位置", canvas.width / 2 + 10, centerY + 120, "#8a5a19", 18);
      drawStopLabel(70, centerY - 172);
    }

    function toCanvasPoint(x, y) {
      if (activeScene === "projectile") {
        const sx = (canvas.width - margin * 2) / 30;
        const sy = (canvas.height - margin * 2) / 18;
        return { x: margin + x * sx, y: canvas.height - margin - y * sy };
      }
      const sx = (canvas.width - margin * 2) / 16;
      return { x: canvas.width / 2 + x * sx, y: canvas.height * 0.58 - y * sx };
    }

    function fromCanvasPoint(px, py) {
      if (activeScene === "projectile") {
        const sx = (canvas.width - margin * 2) / 30;
        const sy = (canvas.height - margin * 2) / 18;
        return { x: (px - margin) / sx, y: (canvas.height - margin - py) / sy };
      }
      const sx = (canvas.width - margin * 2) / 16;
      return { x: (px - canvas.width / 2) / sx, y: (canvas.height * 0.58 - py) / sx };
    }

    function drawGround(y) {
      ctx.strokeStyle = "#52606d";
      ctx.lineWidth = 3;
      line(margin, y, canvas.width - margin, y);
      ctx.fillStyle = "#e8eee8";
      ctx.fillRect(margin, y + 3, canvas.width - margin * 2, 30);
    }

    function drawTrack(y) {
      ctx.strokeStyle = "#52606d";
      ctx.lineWidth = 3;
      line(margin, y, canvas.width - margin, y);
      ctx.strokeStyle = "#d8e1e8";
      ctx.lineWidth = 2;
      line(margin, y + 20, canvas.width - margin, y + 20);
    }

    function drawWall(x, y) {
      ctx.fillStyle = "#51606d";
      ctx.fillRect(x - 16, y - 110, 28, 220);
      ctx.strokeStyle = "#364652";
      for (let i = -100; i < 110; i += 18) line(x - 20, y + i, x + 14, y + i - 18);
    }

    function drawCar(x, y, color) {
      drawBlock(x - 58, y - 32, 116, 62, color);
      drawBall(x - 34, y + 38, 12, "#26313a");
      drawBall(x + 34, y + 38, 12, "#26313a");
    }

    function drawBlock(x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.strokeStyle = "#25313c";
      ctx.lineWidth = 3;
      roundRect(x, y, w, h, 8);
      ctx.fill();
      ctx.stroke();
    }

    function drawBall(x, y, r, color) {
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.strokeStyle = "#25313c";
      ctx.lineWidth = 3;
      ctx.stroke();
    }

    function drawSpringShape(x1, y1, x2, y2) {
      ctx.strokeStyle = "#2364aa";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      const length = Math.max(20, x2 - x1);
      for (let i = 1; i <= 24; i++) {
        const x = x1 + length * i / 24;
        const y = y1 + (i % 2 === 0 ? -12 : 12);
        ctx.lineTo(x, y);
      }
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }

    function drawTrail(mapper) {
      if (trail.length < 2) return;
      ctx.strokeStyle = "#1b7f5f";
      ctx.lineWidth = 3;
      ctx.beginPath();
      trail.forEach((item, index) => {
        const p = mapper(item);
        if (index === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
      });
      ctx.stroke();
    }

    function drawArrow(x1, y1, x2, y2, color, text) {
      const dx = x2 - x1;
      const dy = y2 - y1;
      const length = Math.hypot(dx, dy);
      if (length < 8) {
        label(`${text}≈0`, x1 + 8, y1 - 8, color, 18);
        return;
      }
      const angle = Math.atan2(dy, dx);
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x2, y2);
      ctx.lineTo(x2 - 15 * Math.cos(angle - Math.PI / 6), y2 - 15 * Math.sin(angle - Math.PI / 6));
      ctx.lineTo(x2 - 15 * Math.cos(angle + Math.PI / 6), y2 - 15 * Math.sin(angle + Math.PI / 6));
      ctx.closePath();
      ctx.fill();
      label(text, x2 + 8, y2 - 8, color, 18);
    }

    function drawStopLabel(x, y) {
      if (state.stopped) label(`已停止：${state.stopReason}`, x, y, "#c9413a", 20);
    }

    function line(x1, y1, x2, y2) {
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }

    function label(text, x, y, color, size) {
      ctx.fillStyle = color;
      ctx.font = `700 ${size}px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif`;
      ctx.fillText(text, x, y);
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function format(value) {
      const n = Number.isFinite(value) ? value : 0;
      return n.toFixed(Math.abs(n) >= 10 ? 1 : 2);
    }

    function tick(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.04);
      lastTime = now;
      physics(dt);
      draw();
      requestAnimationFrame(tick);
    }

    document.querySelectorAll(".scene-tab").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".scene-tab").forEach(tab => tab.classList.remove("active"));
        button.classList.add("active");
        activeScene = button.dataset.scene;
        renderScene();
      });
    });

    startButton.addEventListener("click", startSimulation);
    startButtonBottom.addEventListener("click", startSimulation);
    pauseButton.addEventListener("click", () => {
      if (!started || state.stopped) return;
      running = !running;
      pauseButton.textContent = running ? "暂停" : "继续";
      updateReadout();
    });
    resetButton.addEventListener("click", () => resetSimulation(false));
    clearButton.addEventListener("click", clearInputs);

    renderScene();
    requestAnimationFrame(tick);
  </script>
</body>
</html>
